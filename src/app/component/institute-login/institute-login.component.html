<main class="login-container">
  <div class="container h-100 d-flex justify-content-center align-items-center">
    <div class="col-lg-4 col-md-6 col-sm-10">
      
      <div class="card eco-login-card shadow-lg border-0 p-4">
        <div class="card-body">
          
          <div class="text-center mb-4">
            <h2 class="eco-login-title">Welcome Back</h2>
            <p class="eco-login-subtitle">Sign in to your account</p>
          </div>

          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label for="userName" class="form-label-eco">EMAIL ADDRESS</label>
              <input type="email" class="form-control eco-input" id="userName"
                     [(ngModel)]="loginObj.username" name="username" placeholder="Enter email">
            </div>

            <div class="mb-4">
              <label for="userPassword" class="form-label-eco">PASSWORD</label>
              <input type="password" class="form-control eco-input" id="userPassword"
                     [(ngModel)]="loginObj.userPassword" name="userPassword" placeholder="Enter password">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-eco-primary py-2 rounded-pill shadow-sm">
                SIGN IN
              </button>
            </div>

            <div class="text-center mt-4">
              <p class="small eco-text-muted">
                Don't have an account? <br>
                <a href="#" class="eco-link-bold text-decoration-none">Signup</a>
              </p>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</main>
